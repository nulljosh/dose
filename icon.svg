<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="32" fill="#0d1117"/>
  <!-- Pill capsule -->
  <g transform="translate(100,85) rotate(-30)">
    <rect x="-20" y="-40" width="40" height="80" rx="20" fill="none" stroke="#ff6b6b" stroke-width="2.5"/>
    <rect x="-20" y="-40" width="40" height="40" rx="20" fill="#ff6b6b"/>
    <rect x="-20" y="0" width="40" height="40" rx="20" fill="#ff6b6b" opacity="0.4"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>
  </g>
  <!-- Heartbeat line -->
  <polyline points="25,150 55,150 65,150 75,130 85,170 95,140 105,155 115,150 125,150 135,150 145,130 155,170 165,150 175,150" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <!-- Plus cross -->
  <rect x="150" y="35" width="20" height="6" rx="3" fill="#ff6b6b" opacity="0.4"/>
  <rect x="157" y="28" width="6" height="20" rx="3" fill="#ff6b6b" opacity="0.4"/>
</svg>
